<html>
<head>
    <link rel="stylesheet" href="game.css">
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <div class="gameContainer">
        <div class="scoreContainer"></div>
        <table id="field" class="field"></table>
        <div class="leaderboard">
            <h2>Leaderboard</h2>
            <table class="leaderboard-table">
                <tr>
                    <td>42</td>
                    <td>TODO</td>
                </tr>
            </table>
        </div>
        <p class="iHintContainer">Press I to use AI help</p>
        <p class="xHintContainer">Press X to win</p>
    </div>
    <div class="hidden overlay gameover">Game Over</div>
    <div class="overlay start">
        <div>
            <div class="startMessage">Select difficulty</div>
            <div class="mainButtonContainer">
                <ul>
                    <li><button class="easyButton" type="submit">EASY</button></li>
                    <li><button class="mediumButton" type="submit">MEDIUM</button></li>
                    <li><button class="hardButton" type="submit">HARD</button></li>
                </ul>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
